name: Build Release APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Cactus
        run: |
          git clone --depth 1 https://github.com/cactus-compute/cactus.git /tmp/cactus
          cd /tmp/cactus
          source ./setup
          cactus build --android
          mkdir -p $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/
          cp android/libcactus.so $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/

      - name: Convert Needle weights
        run: |
          cd /tmp/cactus
          source ./setup
          cactus convert needle /tmp/needle-weights
          mkdir -p $GITHUB_WORKSPACE/app/src/main/assets/
          cp /tmp/needle-weights/needle.cact $GITHUB_WORKSPACE/app/src/main/assets/

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign APK (if keystore provided)
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore /tmp/release.keystore \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            "$KEY_ALIAS"
          zipalign -v 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/apk/release/app-release-signed.apk
          apksigner sign \
            --ks /tmp/release.keystore \
            --ks-pass pass:"$KEYSTORE_PASSWORD" \
            --key-pass pass:"$KEY_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            app/build/outputs/apk/release/app-release-signed.apk
          echo "APK_PATH=app/build/outputs/apk/release/app-release-signed.apk" >> $GITHUB_ENV

      - name: Set APK path (unsigned)
        if: env.KEYSTORE_BASE64 == ''
        run: echo "APK_PATH=app/build/outputs/apk/release/app-release-unsigned.apk" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: docdroid-release-${{ github.sha }}
          path: ${{ env.APK_PATH }}
          retention-days: 90
          if-no-files-found: error

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_PATH }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print APK info
        run: |
          echo "=== Build Complete ==="
          ls -lh ${{ env.APK_PATH }}
          echo "APK uploaded as artifact: docdroid-release-${{ github.sha }}"
