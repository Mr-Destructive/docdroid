name: Build Release APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install NDK and CMake
        run: |
          sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Cactus
        run: |
          git clone --depth 1 https://github.com/cactus-compute/cactus.git /tmp/cactus
          cd /tmp/cactus
          bash -c "source ./setup && cactus build --android"
          mkdir -p $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/
          cp android/libcactus_engine.so $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/

      - name: Download Needle bundle
        run: |
          mkdir -p $GITHUB_WORKSPACE/app/src/main/assets/needle
          cd /tmp
          wget -q "https://huggingface.co/Cactus-Compute/needle/resolve/main/needle-cq4.zip" -O needle-cq4.zip
          unzip -o needle-cq4.zip -d needle-bundle
          cp -r needle-bundle/* $GITHUB_WORKSPACE/app/src/main/assets/needle/
          ls -la $GITHUB_WORKSPACE/app/src/main/assets/needle/

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.11.1

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Install build-tools
        run: sdkmanager "build-tools;35.0.0"

      - name: Sign APK
        run: |
          keytool -genkeypair -v -keystore /tmp/release.keystore \
            -alias docdroid -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass docdroid123 -keypass docdroid123 \
            -dname "CN=DocDroid, OU=Dev, O=DocDroid, L=Unknown, ST=Unknown, C=US"
          if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk /tmp/app-release.apk
          else
            cp app/build/outputs/apk/release/app-release.apk /tmp/app-release.apk
          fi
          ${ANDROID_HOME}/build-tools/35.0.0/zipalign -v 4 /tmp/app-release.apk /tmp/app-release-aligned.apk
          ${ANDROID_HOME}/build-tools/35.0.0/apksigner sign \
            --ks /tmp/release.keystore \
            --ks-pass pass:docdroid123 \
            --key-pass pass:docdroid123 \
            --ks-key-alias docdroid \
            /tmp/app-release-aligned.apk
          cp /tmp/app-release-aligned.apk app/build/outputs/apk/release/app-release-signed.apk
          echo "APK_PATH=app/build/outputs/apk/release/app-release-signed.apk" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: docdroid-release-${{ github.sha }}
          path: ${{ env.APK_PATH }}
          retention-days: 90
          if-no-files-found: error

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_PATH }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print APK info
        run: |
          echo "=== Build Complete ==="
          ls -lh ${{ env.APK_PATH }}
          echo "APK uploaded as artifact: docdroid-release-${{ github.sha }}"
